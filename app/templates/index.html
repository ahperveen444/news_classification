<!DOCTYPE html>
<html>
<head>
    <title>AI News Classifier</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(to right,#141e30,#243b55);
            color:white;
            text-align:center;
            padding-top:80px;
        }
        .box{
            background:white;
            color:black;
            width:450px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }
        textarea{
            width:90%;
            height:120px;
            padding:10px;
            border-radius:10px;
            border:none;
            font-size:16px;
        }
        button{
            background:#007BFF;
            color:white;
            border:none;
            padding:12px 25px;
            font-size:18px;
            border-radius:8px;
            margin-top:15px;
            cursor:pointer;
        }
        button:hover{
            background:#0056b3;
        }
        h1{margin-bottom:30px;}
        .result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:#007BFF;
        }
    </style>
</head>

<body>
    <h1>📰 AI News Category Predictor</h1>

    <div class="box">
        <form method="POST">
            <textarea name="news" placeholder="Paste news text here..."></textarea><br>
            <button type="submit">Predict Category</button>
        </form>

        {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
        </div>
        {% endif %}
    </div>
</body>
</html>
